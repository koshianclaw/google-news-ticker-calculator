<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google News Ticker + Calculator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Live dashboard</p>
          <h1>Google News Ticker + Calculator</h1>
          <p class="subtitle">
            前端可部署在 GitHub Pages，新聞則透過 serverless API 代理，預設使用台灣區 Google News RSS，並避開瀏覽器直接抓 Google News 的 CORS 問題。
          </p>
        </div>
        <div class="status-card">
          <div><span>狀態</span><strong id="statusText">載入中…</strong></div>
          <div><span>來源</span><strong id="sourceText">-</strong></div>
          <div><span>更新時間</span><strong id="updatedText">-</strong></div>
        </div>
      </header>

      <section class="ticker-panel card">
        <div class="panel-title-row">
          <h2>頭條跑馬燈</h2>
          <button id="refreshButton" class="refresh-button">立即更新</button>
        </div>
        <div class="ticker-wrap">
          <div class="ticker-track" id="tickerTrack">Loading latest headlines…</div>
        </div>
      </section>

      <main class="grid">
        <section class="card news-panel">
          <div class="panel-title-row">
            <h2>最新新聞</h2>
            <span class="pill">自動更新：5 秒</span>
          </div>
          <ul id="newsList" class="news-list">
            <li class="placeholder">Fetching headlines…</li>
          </ul>
        </section>

        <section class="card calculator-panel">
          <div class="panel-title-row">
            <h2>計算機</h2>
            <button id="clearCalcButton" class="ghost-button">清除</button>
          </div>

          <div class="calc-display">
            <div id="calcExpression" class="calc-expression">0</div>
            <div id="calcResult" class="calc-result">0</div>
          </div>

          <div id="calcKeys" class="calc-grid">
            <button data-action="clear">AC</button>
            <button data-action="delete">DEL</button>
            <button data-value="(">(</button>
            <button data-value=")">)</button>
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="/" class="operator">÷</button>
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="*" class="operator">×</button>
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="-" class="operator">−</button>
            <button data-value="0" class="span-2">0</button>
            <button data-value=".">.</button>
            <button data-value="+" class="operator">+</button>
            <button data-action="equals" class="equals span-4">=</button>
          </div>
        </section>
      </main>
    </div>

    <script>
      window.APP_CONFIG = {
        apiBaseUrl: 'https://YOUR-VERCEL-PROJECT.vercel.app'
      };
    </script>
    <script src="./app.js"></script>
  </body>
</html>
